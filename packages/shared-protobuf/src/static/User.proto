syntax = "proto3";

import "Common.proto";

message UserInfo {
  string id = 1;
  string email = 2;
  optional string nickname = 3; 
  optional string avatar_url = 4; 
  int32 state = 5;
  int64 update_time = 6;
}

message GetUserList {
  Common.PaginationRequest pagination = 1;
  string word = 2;
}

message GetUserListResponse{
  Common.PaginationResponse pagination = 1;
  repeated UserInfo list = 2;
}