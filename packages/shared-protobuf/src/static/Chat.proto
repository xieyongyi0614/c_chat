syntax = "proto3";

import "Common.proto";
import "User.proto";

// 创建会话请求 (私聊)
message CreateConversationRequest {
  string target_id = 1;
}

message GroupInfo {
  string id = 1;
  string name = 2;
  optional string avatar_url = 3;
  optional string notice = 4;
  string owner_id = 5;
  int32 state = 6;
  int64 update_time = 7;
  int64 create_time = 8;
}

message CreateGroupRequest {
  string name = 1;
  repeated string member_ids = 2;
  optional string avatar_url = 3;
}

message CreateGroupResponse {
  GroupInfo group = 1;
  ConversationInfo conversation = 2;
}

message GetGroupDetailRequest {
  string group_id = 1;
}

message GroupMemberInfo {
  string user_id = 1;
  string nickname = 2;
  optional string avatar_url = 3;
  int32 role = 4;
  optional string alias = 5;
  int32 state = 6;
}

message GetGroupDetailResponse {
  GroupInfo group = 1;
  repeated GroupMemberInfo members = 2;
}

message UpdateGroupRequest {
  string group_id = 1;
  optional string name = 2;
  optional string avatar_url = 3;
  optional string notice = 4;
}

message GroupOperationResponse {
  bool success = 1;
  optional GroupInfo group = 2;
  optional ConversationInfo conversation = 3;
}

message InviteGroupMembersRequest {
  string group_id = 1;
  repeated string member_ids = 2;
}

message LeaveGroupRequest {
  string group_id = 1;
}

message DismissGroupRequest {
  string group_id = 1;
}

message TargetInfo {
  string id = 1;
  string name = 2;
  string avatar_url = 3;
}

message SenderInfo {
  string id = 1;
  optional string nickname = 2;
  optional string avatar_url = 3;
  optional string email = 4;
}

// 上传后的文件实体（与库表 File 对应）
message FileInfo {
  string id = 1;
  string file_name = 2;
  string url = 3;
  string mime_type = 4;
  optional string ext = 5;
  int64 size = 6;
}

// 消息附件元数据（波形、时长、缩略图等），与库表 Media 对应
message MediaInfo {
  string id = 1;
  int32 type = 2; // 与消息 type 一致：0 文本无媒体时可不传
  string file_id = 3;
  FileInfo file = 4;
  optional string file_url = 5;
  optional string thumb_url = 6;
  optional int32 width = 7;
  optional int32 height = 8;
  optional int32 duration_sec = 9;
  optional string waveform = 10;
}
// 会话信息
message ConversationInfo {
  string id = 1;
  int32 type = 2; // 1: 私聊, 2: 群聊
  optional TargetInfo target_info = 3; // 目标信息（用户或群）
  optional string last_msg_content = 4;
  optional int64 last_msg_time = 5;
  int64 update_time = 6;
  int64 create_time = 7;
  optional int32 unread_count = 8; // 当前用户在该会话下的未读数
  optional string last_read_seq = 9; // 当前用户已读到的最近消息 msgId
}

// 发送消息请求
message SendMessageRequest {
  string conversation_id = 1;
  string content = 2;
  int32 type = 3; // 0:文本, 1:图片, 2:文件, 3:音频, 4:视频
  optional string target_id = 4; // 私聊可选：对方 ID，用于首条消息自动创建会话
  string clientMsgId = 5;
  optional string mediaGroupId = 6;
  optional string fileId = 7;  // 上传完成后的 File.id
  optional int32 duration_sec = 8;   // 音视频时长（秒）
  optional string waveform = 9;       // 语音波形采样
  optional string thumb_url = 10;    // 视频封面 / 自定义缩略图
}
message AckSendMessage{
  string clientMsgId = 1;
  string status = 2; 
}

// 消息信息
message MessageInfo {
  string id = 1;
  string seq = 2;
  string sender_id = 3;
  string conversation_id = 4;
  string content = 5;
  int32 type = 6;
  int32 state = 7;
  int64 create_time = 8;
  int64 update_time = 9;
  string client_msg_id = 10;
  optional string mediaGroupId = 11;
  optional MediaInfo media = 12; 
  optional SenderInfo sender_info = 13;
}

// 获取会话列表请求
message GetConversationListRequest {
  Common.PaginationRequest pagination = 1;
}

// 获取会话列表响应
message GetConversationListResponse {
  Common.PaginationResponse pagination = 1;
  repeated ConversationInfo list = 2;
}

// 获取消息历史请求
message GetMessageHistoryRequest {
  string conversation_id = 1;
  Common.PaginationRequest pagination = 2;
  optional int32 after_msg_id = 3;  // 拉取该 msgId 之后的新增消息
  optional int32 before_msg_id = 4; // 拉取该 msgId 之前的历史消息
  optional int32 limit = 5;         // 游标模式每次最多返回条数
}

// 获取消息历史响应
message GetMessageHistoryResponse {
  Common.PaginationResponse pagination = 1;
  repeated MessageInfo list = 2;
}

// 读消息请求
message ReadMessageRequest {
  string conversation_id = 1;
  optional string msg_seq = 2; // 不传时默认读到当前会话最新一条消息
}

// 读消息响应
message ReadMessageResponse {
  string conversation_id = 1;
  optional string msg_seq = 2;
  int32 unread_count = 3;
}



// 发送附件消息，文件上传完成
message SendFileUploadComplete{
  string uploadId = 1;
  string fileId = 2;
}
message NewUpdateMessage{
  repeated MessageInfo messages = 1;
  repeated UserInfo users = 2;
  repeated ConversationInfo conversations = 3;
  repeated string removed_conversation_ids = 4;
}
