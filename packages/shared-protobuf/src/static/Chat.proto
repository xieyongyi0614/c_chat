syntax = "proto3";

import "Common.proto";
import "User.proto";

// 创建会话请求 (私聊)
message CreateConversationRequest {
  string target_id = 1;
}

// 会话信息
message ConversationInfo {
  string id = 1;
  int32 type = 2; // 1: 私聊, 2: 群聊
  string group_id = 3;
  optional string last_msg_content = 4;
  optional int64 last_msg_time = 5;
  int64 update_time = 6;
  int64 create_time = 7;
  optional UserInfo user = 8; // 私聊时对方的用户信息
  optional string group_name = 9; // 群聊时群名称
  optional string group_avatar = 10; // 群聊时群头像
  optional int32 unread_count = 11; // 当前用户在该会话下的未读数
  optional int32 last_read_message_id = 12; // 当前用户已读到的最近消息 msgId
}

// 发送消息请求
message SendMessageRequest {
  string conversation_id = 1;
  string content = 2;
  int32 type = 3; // 0:文本, 1:图片, 2:文件, 3:音频, 4:视频
  optional string target_id = 4; // 私聊可选：对方 ID，用于首条消息自动创建会话
}

// 消息信息
message MessageInfo {
  string id = 1;
  int32 msg_id = 2;
  string sender_id = 3;
  string conversation_id = 4;
  string content = 5;
  int32 type = 6;
  int32 state = 7;
  int64 create_time = 8;
  int64 update_time = 9;
}

// 获取会话列表请求
message GetConversationListRequest {
  Common.PaginationRequest pagination = 1;
}

// 获取会话列表响应
message GetConversationListResponse {
  Common.PaginationResponse pagination = 1;
  repeated ConversationInfo list = 2;
}

// 获取消息历史请求
message GetMessageHistoryRequest {
  string conversation_id = 1;
  Common.PaginationRequest pagination = 2;
}

// 获取消息历史响应
message GetMessageHistoryResponse {
  Common.PaginationResponse pagination = 1;
  repeated MessageInfo list = 2;
}

// 读消息请求
message ReadMessageRequest {
  string conversation_id = 1;
  optional string message_id = 2; // 不传时默认读到当前会话最新一条消息
}

// 读消息响应
message ReadMessageResponse {
  string conversation_id = 1;
  optional string message_id = 2;
  int32 unread_count = 3;
}
