services:
  mysql:
    image: mysql:8.0
    container_name: c_chat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: c_chat
      TZ: Asia/Shanghai
    ports:
      - '3306:3306'
    volumes:
      - c_chat_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot', '--silent']
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: c_chat_redis
    restart: unless-stopped
    command: ['redis-server', '--requirepass', 'redis123456', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - c_chat_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis123456', 'ping']
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  c_chat_mysql_data:
  c_chat_redis_data:
